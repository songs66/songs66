<svg width="430" height="190" viewBox="0 0 430 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top Languages</title>
  <desc id="desc">Self-hosted GitHub profile statistics card generated by GitHub Actions.</desc>
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="430" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050b16"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0" y1="0" x2="430" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#30363d" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#d2a8ff" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="24" y1="0" x2="406" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.55" stop-color="#d2a8ff"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>
  <rect x="0.75" y="0.75" width="428.5" height="188.5" rx="16" fill="url(#card-bg)" stroke="url(#border-grad)" stroke-width="1.5"/>
  <circle cx="370" cy="26" r="54" fill="#58a6ff" opacity="0.13" filter="url(#blur-glow)"/>
  <circle cx="62" cy="171" r="46" fill="#d2a8ff" opacity="0.10" filter="url(#blur-glow)"/>
  <path d="M24 49 H406" stroke="url(#accent-grad)" stroke-width="1" opacity="0.55"/>
  
