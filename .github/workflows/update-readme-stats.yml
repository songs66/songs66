name: Update profile stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"
  push:
    paths:
      - ".github/workflows/update-readme-stats.yml"
      - "scripts/generate_readme_stats.py"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate SVG cards
        env:
          GITHUB_USERNAME: songs66
        run: python scripts/generate_readme_stats.py

      - name: Commit generated cards
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain assets/github-stats.svg assets/top-langs.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/github-stats.svg assets/top-langs.svg
            git commit -m "chore: update profile stats cards"
            git push
          else
            echo "No changes to commit"
          fi
